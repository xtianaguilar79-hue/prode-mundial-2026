<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar · Prode Mundial 2026</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .grupos-container {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 12px;
      margin-bottom: 12px;
    }
    .grupos-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
      min-height: 20px;
    }
    .grupo-chip {
      background: var(--gold-soft);
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .grupo-chip button {
      background: none;
      border: none;
      color: var(--gold);
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      padding: 0;
      line-height: 1;
    }
    .grupo-chip button:hover { color: var(--red); }
    .grupo-input-row {
      display: flex;
      gap: 6px;
    }
    .grupo-input-row input {
      flex: 1;
      padding: 8px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }
    .grupo-input-row input:focus { border-color: var(--gold); }
    .grupo-input-row button {
      padding: 8px 14px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .grupo-hint {
      font-size: 11px;
      color: var(--text3);
      margin-top: 6px;
    }
  </style>
</head>
<body>

<div class="splash">
  <div class="splash-box">
    <div class="copa">🏆</div>
    <h1>PRODE<br>MUNDIAL 2026</h1>
    <p id="subtitulo">Ingresá a tu cuenta</p>

    <div id="error" class="error" style="display:none"></div>
    <div id="ok" class="ok" style="display:none"></div>

    <form id="form">
      <input type="text" id="nombre" class="input" placeholder="Nombre" style="display:none">
      <input type="text" id="apellido" class="input" placeholder="Apellido" style="display:none">
      <input type="text" id="apodo" class="input" placeholder="Apodo (opcional)" style="display:none">
      
      <div id="gruposContainer" class="grupos-container" style="display:none">
        <label style="display:block; font-size:12px; color:var(--text2); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px;">
          🏢 Empresa, Colegio o Grupo (opcional)
        </label>
        <div id="gruposList" class="grupos-list"></div>
        <div class="grupo-input-row">
          <input type="text" id="grupoInput" placeholder="Ej: Empresa X, Colegio Y, Amigos del barrio">
          <button type="button" id="btnAgregarGrupo">+ Agregar</button>
        </div>
        <div class="grupo-hint">
          💡 Podés agregar varios grupos. Competirás en el ranking general y también contra los miembros de cada grupo.
        </div>
      </div>

      <input type="email" id="email" class="input" placeholder="Email" required autocomplete="email">
      <input type="password" id="password" class="input" placeholder="Contraseña (mín. 6 caracteres)" required minlength="6" autocomplete="current-password">
      <button type="submit" class="btn" id="btnSubmit">Ingresar</button>
    </form>

    <p style="margin-top:16px; font-size:13px; color:var(--text2)">
      <span id="textoCambio">¿No tenés cuenta?</span>
      <button id="btnCambiar" style="background:none;border:none;color:var(--gold);cursor:pointer;font-weight:700;margin-left:4px;font-family:inherit;font-size:13px">
        Registrate
      </button>
    </p>

    <p style="margin-top:8px; font-size:12px">
      <a href="instructivo.html">📘 Leer reglamento completo</a>
    </p>

    <p style="margin-top:8px; font-size:12px">
      <a href="index.html">← Volver al inicio</a>
    </p>
  </div>
</div>

<script type="module">
  import { supabase, ADMIN_EMAIL } from "./js/supabase-config.js";

  let modo = "login";
  let gruposAgregados = [];

  const $ = id => document.getElementById(id);

  console.log("🔥 Supabase inicializado");

  // Verificar si ya está logueado
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    window.location.href = "prode.html";
  }

  function renderGrupos() {
    const list = $("gruposList");
    if (gruposAgregados.length === 0) {
      list.innerHTML = '<span style="color:var(--text3); font-size:12px;">Sin grupos agregados</span>';
      return;
    }
    list.innerHTML = gruposAgregados.map((g, i) => `
      <span class="grupo-chip">
        ${g}
        <button type="button" onclick="window.__quitarGrupo(${i})">×</button>
      </span>
    `).join("");
  }

  window.__agregarGrupo = () => {
    const input = $("grupoInput");
    const valor = input.value.trim();
    if (!valor) return;
    if (gruposAgregados.includes(valor)) {
      input.value = "";
      return;
    }
    if (gruposAgregados.length >= 10) {
      alert("Máximo 10 grupos por usuario");
      return;
    }
    gruposAgregados.push(valor);
    input.value = "";
    renderGrupos();
  };

  window.__quitarGrupo = (index) => {
    gruposAgregados.splice(index, 1);
    renderGrupos();
  };

  $("btnAgregarGrupo").onclick = window.__agregarGrupo;
  $("grupoInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      window.__agregarGrupo();
    }
  });

  $("btnCambiar").onclick = () => {
    modo = modo === "login" ? "registro" : "login";
    $("subtitulo").textContent = modo === "login" ? "Ingresá a tu cuenta" : "Creá tu cuenta";
    $("textoCambio").textContent = modo === "login" ? "¿No tenés cuenta?" : "¿Ya tenés cuenta?";
    $("btnCambiar").textContent = modo === "login" ? "Registrate" : "Ingresá";
    $("btnSubmit").textContent = modo === "login" ? "Ingresar" : "Registrarme";
    
    const camposRegistro = ["nombre", "apellido", "apodo", "gruposContainer"];
    camposRegistro.forEach(id => {
      $(id).style.display = modo === "registro" ? "block" : "none";
      if (modo === "registro") {
        $("nombre").setAttribute("required", "");
        $("apellido").setAttribute("required", "");
      } else {
        $("nombre").removeAttribute("required");
        $("apellido").removeAttribute("required");
        $("nombre").value = "";
        $("apellido").value = "";
        $("apodo").value = "";
        gruposAgregados = [];
        renderGrupos();
      }
    });
    
    ocultarMensajes();
    if (modo === "registro") renderGrupos();
  };

  $("form").onsubmit = async (e) => {
    e.preventDefault();
    ocultarMensajes();

    const email = $("email").value.trim().toLowerCase();
    const password = $("password").value;
    const btn = $("btnSubmit");

    if (modo === "registro") {
      const nombre = $("nombre").value.trim();
      const apellido = $("apellido").value.trim();
      const apodo = $("apodo").value.trim();

      if (!nombre) { mostrarError("Ingresá tu nombre"); return; }
      if (!apellido) { mostrarError("Ingresá tu apellido"); return; }

      btn.disabled = true;
      btn.textContent = "Procesando...";

      try {
        console.log("🔐 Creando usuario en Supabase...");
        
        // 1. Crear usuario en Authentication
        const { data: authData, error: authError } = await supabase.auth.signUp({
          email,
          password,
        });

        if (authError) throw authError;
        if (!authData.user) throw new Error("No se creó el usuario");

        console.log("✅ Usuario creado:", authData.user.id);

        // 2. Crear perfil en tabla usuarios
        const { error: profileError } = await supabase
          .from('usuarios')
          .insert({
            id: authData.user.id,
            email: email,
            nombre: nombre,
            apellido: apellido,
            apodo: apodo || null,
            grupos: gruposAgregados,
            es_admin: email === ADMIN_EMAIL.toLowerCase(),
            puntos_totales: 0
          });

        if (profileError) throw profileError;

        console.log("✅ Perfil creado en Supabase");

        // 3. Iniciar sesión automáticamente
        const { error: signInError } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (signInError) throw signInError;

        mostrarOk("¡Cuenta creada! Redirigiendo...");
        setTimeout(() => window.location.href = "prode.html", 1000);

      } catch (err) {
        console.error("❌ Error:", err);
        mostrarError(err.message || "Error al registrar");
        btn.disabled = false;
        btn.textContent = "Registrarme";
      }

    } else {
      // LOGIN
      btn.disabled = true;
      btn.textContent = "Procesando...";

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;

        mostrarOk("Ingresando...");
        setTimeout(() => window.location.href = "prode.html", 800);

      } catch (err) {
        console.error("❌ Error login:", err);
        mostrarError(err.message || "Email o contraseña incorrectos");
        btn.disabled = false;
        btn.textContent = "Ingresar";
      }
    }
  };

  function mostrarError(msg) {
    $("error").textContent = msg;
    $("error").style.display = "block";
  }

  function mostrarOk(msg) {
    $("ok").textContent = msg;
    $("ok").style.display = "block";
  }

  function ocultarMensajes() {
    $("error").style.display = "none";
    $("ok").style.display = "none";
  }
</script>

</body>
</html>

<script type="module">

  const PARTIDOS_ID_MAP = {};

  const RANKING_FIFA = {

  const ESTRUCTURA_CUARTOS = [

    { id: 'M098', local: 'G091', visit: 'G092' },
    { id: 'M099', local: 'G093', visit: 'G094' },

  ];

    { id: 'M101', local: 'G097', visit: 'G098' },
    { id: 'M102', local: 'G099', visit: 'G100' }
  ];

  const ESTRUCTURA_FINAL = [
    { id: 'M103', local: 'P101', visit: 'P102' },
    { id: 'M104', local: 'G101', visit: 'G102' }
  ];

  function initEquipo(tabla, nombre) {
    tabla[nombre] = { equipo: nombre, pj: 0, pg: 0, pe: 0, pp: 0, gf: 0, gc: 0, dg: 0, pts: 0 };
  }

  function actualizarStats(eq, golesFavor, golesContra) {
    eq.pj++;
    eq.gf += golesFavor;
    eq.gc += golesContra;
    eq.dg = eq.gf - eq.gc;
    if (golesFavor > golesContra) { eq.pg++; eq.pts += 3; }
    else if (golesFavor === golesContra) { eq.pe++; eq.pts += 1; }
    else { eq.pp++; }
  }

  function calcularEstadisticasDirectas(equipoA, equipoB, partidosGrupo, resultados) {
    const statsA = { pts: 0, gf: 0, gc: 0, dg: 0 };
    const statsB = { pts: 0, gf: 0, gc: 0, dg: 0 };

    partidosGrupo.forEach(p => {
      const entreEllos = 
        (p.local === equipoA && p.visit === equipoB) ||
        (p.local === equipoB && p.visit === equipoA);
      
      if (!entreEllos) return;
      
      const res = resultados.find(r => r.partido_id === p.id);
      if (!res || res.local === null || res.visit === null) return;

      const gL = parseInt(res.local);
      const gV = parseInt(res.visit);

      if (p.local === equipoA) {
        statsA.gf += gL;
        statsA.gc += gV;
        statsA.dg += (gL - gV);
        statsB.gf += gV;
        statsB.gc += gL;
        statsB.dg += (gV - gL);

        if (gL > gV) statsA.pts += 3;
        else if (gV > gL) statsB.pts += 3;
        else {
          statsA.pts += 1;
          statsB.pts += 1;
        }
      } else {
        statsB.gf += gL;
        statsB.gc += gV;
        statsB.dg += (gL - gV);
        statsA.gf += gV;
        statsA.gc += gL;
        statsA.dg += (gV - gL);

        if (gL > gV) statsB.pts += 3;
        else if (gV > gL) statsA.pts += 3;
        else {
          statsB.pts += 1;
          statsA.pts += 1;
        }
      }
    });

    return { statsA, statsB };
  }

  function calcularFairPlay(equipo, partidosGrupo, resultados) {
    let puntos = 0;
    
    partidosGrupo.forEach(p => {
      const res = resultados.find(r => r.partido_id === p.id);
      if (!res) return;
      
      if (p.local === equipo) {
        const amarillas = parseInt(res.amarillas_local) || 0;
        const rojas = parseInt(res.rojas_local) || 0;
        puntos += (amarillas * -1) + (rojas * -3);
      } else if (p.visit === equipo) {
        const amarillas = parseInt(res.amarillas_visit) || 0;
        const rojas = parseInt(res.rojas_visit) || 0;
        puntos += (amarillas * -1) + (rojas * -3);
      }
    });
    
    return puntos;
  }

  function compararEquipos(a, b, tabla, partidosGrupo, resultados) {
    if (b.pts !== a.pts) return b.pts - a.pts;

    const { statsA, statsB } = calcularEstadisticasDirectas(a.equipo, b.equipo, partidosGrupo, resultados);
    
    if (statsB.pts !== statsA.pts) return statsB.pts - statsA.pts;
    if (statsB.dg !== statsA.dg) return statsB.dg - statsA.dg;
    if (statsB.gf !== statsA.gf) return statsB.gf - statsA.gf;

    if (b.dg !== a.dg) return b.dg - a.dg;
    if (b.gf !== a.gf) return b.gf - a.gf;

    const fairPlayA = calcularFairPlay(a.equipo, partidosGrupo, resultados);
    const fairPlayB = calcularFairPlay(b.equipo, partidosGrupo, resultados);
    if (fairPlayA !== fairPlayB) return fairPlayB - fairPlayA;

    const rA = RANKING_FIFA[a.equipo] || 100;
    const rB = RANKING_FIFA[b.equipo] || 100;
    return rA - rB;
  }

  function calcularClasificacion(resultados) {
    const GRUPOS = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];
    const clasificacion = {};

    GRUPOS.forEach(grupo => {
      const partidosGrupo = PARTIDOS_GRUPOS.filter(p => p.grupo === grupo);
      const tabla = {};

      partidosGrupo.forEach(p => {
        if (!tabla[p.local]) initEquipo(tabla, p.local);
        if (!tabla[p.visit]) initEquipo(tabla, p.visit);

        const res = resultados.find(r => r.partido_id === p.id);
        if (res && res.local !== null && res.visit !== null) {
          const gL = parseInt(res.local);
          const gV = parseInt(res.visit);
          actualizarStats(tabla[p.local], gL, gV);
          actualizarStats(tabla[p.visit], gV, gL);
        }
      });

      const ordenados = Object.values(tabla).sort((a, b) => 
        compararEquipos(a, b, tabla, partidosGrupo, resultados)
      );

      clasificacion[grupo] = {
        primero: ordenados[0]?.equipo || null,
        segundo: ordenados[1]?.equipo || null,
        tercero: ordenados[2]?.equipo || null,
        stats: ordenados
      };
    });

    return clasificacion;
  }

  function obtenerMejoresTerceros(clasificacion, resultados) {
    const terceros = Object.entries(clasificacion)
      .map(([grupo, data]) => {
        const equipo = data.tercero;
        if (!equipo) return null;

        const partidosGrupo = PARTIDOS_GRUPOS.filter(p => p.grupo === grupo);
        
        const statsEquipo = data.stats.find(s => s.equipo === equipo);
        
        return {
          grupo,
          equipo,
          pts: statsEquipo?.pts || 0,
          dg: statsEquipo?.dg || 0,
          gf: statsEquipo?.gf || 0,
          fairPlay: calcularFairPlay(equipo, partidosGrupo, resultados),
          rankingFifa: RANKING_FIFA[equipo] || 100
        };
      })
      .filter(t => t !== null)
      .sort((a, b) => {
        if (b.pts !== a.pts) return b.pts - a.pts;
        if (b.dg !== a.dg) return b.dg - a.dg;
        if (b.gf !== a.gf) return b.gf - a.gf;
        if (b.fairPlay !== a.fairPlay) return b.fairPlay - a.fairPlay;
        return a.rankingFifa - b.rankingFifa;
      })
      .slice(0, 8);

    return terceros;
  }

  (async () => {
    try {
      const { data: resultados, error } = await supabase
        .from('resultados')
        .select('*');

      if (error) {
        console.error("Error al cargar resultados:", error);
        throw error;
      }

      console.log("✅ Resultados cargados:", resultados?.length || 0);

      const clasificacion = calcularClasificacion(resultados || []);
      renderClasificados(clasificacion, resultados || []);
      renderTablas(resultados || []);
      renderEliminatorias(resultados || [], clasificacion);
      
      document.getElementById('loader').style.display = 'none';
      document.getElementById('txt-actualizado').textContent = `Última actualización: ${new Date().toLocaleTimeString()}`;
    } catch (err) {
      console.error("Error crítico:", err);
      document.getElementById('loader').innerHTML = `<p style="color:var(--red)">Error al cargar datos: ${err.message}</p>`;
    }
  })();

  function renderClasificados(clasificacion, resultados) {
    try {
      const contenedor = document.getElementById('contenido-clasificados');
      
      const GRUPOS = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];
      
      const primeros = GRUPOS.map(grupo => {
        const data = clasificacion[grupo];
        const equipo = data.primero;
        const statsEquipo = data.stats.find(s => s.equipo === equipo);
        return {
          grupo,
          equipo,
          pts: statsEquipo?.pts || 0,
          dg: statsEquipo?.dg || 0,
          gf: statsEquipo?.gf || 0,
          rankingFifa: RANKING_FIFA[equipo] || 100
        };
      }).sort((a, b) => {
        if (b.pts !== a.pts) return b.pts - a.pts;
        if (b.dg !== a.dg) return b.dg - a.dg;
        if (b.gf !== a.gf) return b.gf - a.gf;
        return a.rankingFifa - b.rankingFifa;
      });

      const segundos = GRUPOS.map(grupo => {
        const data = clasificacion[grupo];
        const equipo = data.segundo;
        const statsEquipo = data.stats.find(s => s.equipo === equipo);
        return {
          grupo,
          equipo,
          pts: statsEquipo?.pts || 0,
          dg: statsEquipo?.dg || 0,
          gf: statsEquipo?.gf || 0,
          rankingFifa: RANKING_FIFA[equipo] || 100
        };
      }).sort((a, b) => {
        if (b.pts !== a.pts) return b.pts - a.pts;
        if (b.dg !== a.dg) return b.dg - a.dg;
        if (b.gf !== a.gf) return b.gf - a.gf;
        return a.rankingFifa - b.rankingFifa;
      });

      const terceros = obtenerMejoresTerceros(clasificacion, resultados);

      let html = '<div class="clasificados-title">🏆 CLASIFICADOS A 16AVOS DE FINAL</div>';
      html += '<div class="clasificados-grid">';

      html += `
        <div class="clasificados-columna">
          <h3>🥇 PRIMEROS (12)</h3>
          <table>
            <thead>
              <tr><th>#</th><th>Equipo</th><th>Grupo</th><th>PTS</th><th>DG</th><th>GF</th></tr>
            </thead>
            <tbody>
              ${primeros.map((eq, i) => `
                <tr>
                  <td>${i + 1}</td>
                  <td><span class="flag-sm">${FLAGS[eq.equipo] || '🏳️'}</span> ${eq.equipo}</td>
                  <td><span class="grupo-badge">${eq.grupo}</span></td>
                  <td><strong>${eq.pts}</strong></td>
                  <td>${eq.dg > 0 ? '+' + eq.dg : eq.dg}</td>
                  <td>${eq.gf}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;

      html += `
        <div class="clasificados-columna">
          <h3>🥈 SEGUNDOS (12)</h3>
          <table>
            <thead>
              <tr><th>#</th><th>Equipo</th><th>Grupo</th><th>PTS</th><th>DG</th><th>GF</th></tr>
            </thead>
            <tbody>
              ${segundos.map((eq, i) => `
                <tr>
                  <td>${i + 1}</td>
                  <td><span class="flag-sm">${FLAGS[eq.equipo] || '🏳️'}</span> ${eq.equipo}</td>
                  <td><span class="grupo-badge">${eq.grupo}</span></td>
                  <td><strong>${eq.pts}</strong></td>

  function determinarCruces16avos(clasificacion) {
    try {
      const tercerosOrdenados = Object.entries(clasificacion)
        .map(([grupo, data]) => ({
          grupo,
          equipo: data.tercero,
          pts: data.stats[2]?.pts || 0,
          dg: data.stats[2]?.dg || 0,
          gf: data.stats[2]?.gf || 0,
          rankingFifa: RANKING_FIFA[data.tercero] || 100
        }))
        .filter(t => t.equipo !== null && t.equipo !== undefined)
        .sort((a, b) => {
          if (b.pts !== a.pts) return b.pts - a.pts;
          if (b.dg !== a.dg) return b.dg - a.dg;
          if (b.gf !== a.gf) return b.gf - a.gf;
          return a.rankingFifa - b.rankingFifa;
        })
        .slice(0, 8);

      console.log("🥉 8 mejores terceros:", tercerosOrdenados.map(t => `${t.equipo} (${t.grupo}) - ${t.pts}pts`));

      const tercerosAsignados = new Set();
      const asignacionCruces = {};
      
      function asignarTerceros(crucesRestantes) {
        if (crucesRestantes.length === 0) return true;
        
        const cruceActual = crucesRestantes.reduce((min, cruce) => {
          const opcionesMin = tercerosOrdenados.filter(t => 
            min.gruposPermitidos.includes(t.grupo) && !tercerosAsignados.has(t.equipo)
          ).length;
          const opcionesCruce = tercerosOrdenados.filter(t => 
            cruce.gruposPermitidos.includes(t.grupo) && !tercerosAsignados.has(t.equipo)
          ).length;
          return opcionesCruce < opcionesMin ? cruce : min;
        });
        
        const otrosCruces = crucesRestantes.filter(c => c.cruceId !== cruceActual.cruceId);
        
        for (const tercero of tercerosOrdenados) {
          if (cruceActual.gruposPermitidos.includes(tercero.grupo) && !tercerosAsignados.has(tercero.equipo)) {
            asignacionCruces[cruceActual.cruceId] = tercero;
            tercerosAsignados.add(tercero.equipo);
            
            if (asignarTerceros(otrosCruces)) {
              return true;
            }
            
            delete asignacionCruces[cruceActual.cruceId];
            tercerosAsignados.delete(tercero.equipo);
          }
        }
        
        return false;
      }
      
      const crucesParaAsignar = Object.entries(CRUCES_TERCIEROS_FIFA).map(([cruceId, gruposPermitidos]) => ({
        cruceId,
        gruposPermitidos
      }));
      
      const exito = asignarTerceros(crucesParaAsignar);
      
      if (!exito) {
        console.warn("⚠️ No se pudo encontrar asignación perfecta. Asignando parcialmente...");
        
        tercerosAsignados.clear();
        Object.keys(asignacionCruces).forEach(key => delete asignacionCruces[key]);
        
        const crucesOrdenados = Object.entries(CRUCES_TERCIEROS_FIFA)
          .map(([cruceId, gruposPermitidos]) => {
            const opciones = tercerosOrdenados.filter(t => gruposPermitidos.includes(t.grupo));
            return { cruceId, gruposPermitidos, opciones };
          })
          .sort((a, b) => a.opciones.length - b.opciones.length);
        
        for (const { cruceId, gruposPermitidos } of crucesOrdenados) {
          for (const tercero of tercerosOrdenados) {
            if (gruposPermitidos.includes(tercero.grupo) && !tercerosAsignados.has(tercero.equipo)) {
              asignacionCruces[cruceId] = tercero;
              tercerosAsignados.add(tercero.equipo);
              console.log(`✅ ${cruceId}: ${tercero.equipo} (Grupo ${tercero.grupo})`);
              break;
            }
          }
        }
      }
      
      console.log("📊 Asignación final:", asignacionCruces);
      console.log(`📊 Terceros asignados: ${Object.keys(asignacionCruces).length} de 8`);

      const cruces = ESTRUCTURA_16AVOS.map(estructura => {
        let local = null;
        let visit = null;

        if (estructura.local.startsWith('1°')) {
          const grupo = estructura.local.substring(2);
          local = {
            equipo: clasificacion[grupo]?.primero || null,
            grupo: grupo,
            pts: clasificacion[grupo]?.stats[0]?.pts || 0
          };
        } else if (estructura.local.startsWith('2°')) {
          const grupo = estructura.local.substring(2);
          local = {
            equipo: clasificacion[grupo]?.segundo || null,
            grupo: grupo,
            pts: clasificacion[grupo]?.stats[1]?.pts || 0
          };
        }

        if (estructura.visit.startsWith('1°')) {
          const grupo = estructura.visit.substring(2);
          visit = {
            equipo: clasificacion[grupo]?.primero || null,
            grupo: grupo,
            pts: clasificacion[grupo]?.stats[0]?.pts || 0
          };
        } else if (estructura.visit.startsWith('2°')) {
          const grupo = estructura.visit.substring(2);
          visit = {
            equipo: clasificacion[grupo]?.segundo || null,
            grupo: grupo,
            pts: clasificacion[grupo]?.stats[1]?.pts || 0
          };
        } else if (estructura.visit === '3°') {
          visit = asignacionCruces[estructura.id] || null;
        }

        return {
          id: estructura.id,
          local: local,
          visit: visit
        };
      });

      return cruces;
    } catch (err) {
      console.error("Error en determinarCruces16avos:", err);
      return [];
    }
  }

  function resolverGanador(partidoId, resultados) {
    const res = resultados.find(r => r.partido_id === partidoId);
    if (!res || res.local === null || res.visit === null) return null;
    
    const gL = parseInt(res.local);
    const gV = parseInt(res.visit);
    
    if (gL > gV) return 'local';
    if (gV > gL) return 'visit';
    
    if (res.alargue_local !== null && res.alargue_visit !== null) {
      const alL = parseInt(res.alargue_local);
      const alV = parseInt(res.alargue_visit);
      if (alL > alV) return 'local';
      if (alV > alL) return 'visit';
      
      if (res.penales_local !== null && res.penales_visit !== null) {
        return parseInt(res.penales_local) > parseInt(res.penales_visit) ? 'local' : 'visit';
      }
    }
    
    return null;
  }

  function obtenerEquipoDeCruce(posicion, resultados, clasificacion) {
    if (!posicion) return null;
    if (posicion.equipo) return posicion;
    
    if (posicion.startsWith('G')) {
      const partidoId = 'M' + posicion.substring(1);
      const ganador = resolverGanador(partidoId, resultados);
      if (!ganador) return null;
      
      const partido = TODOS_PARTIDOS.find(p => p.id === partidoId);
      if (!partido) return null;
      
      const equipoNombre = ganador === 'local' ? partido.local : partido.visit;
      return { equipo: equipoNombre, grupo: null, pts: 0 };
    }
    
    if (posicion.startsWith('P')) {
      const partidoId = 'M' + posicion.substring(1);
      const ganador = resolverGanador(partidoId, resultados);
      if (!ganador) return null;
      
      const partido = TODOS_PARTIDOS.find(p => p.id === partidoId);
      if (!partido) return null;
      
      const perdedorNombre = ganador === 'local' ? partido.visit : partido.local;
      return { equipo: perdedorNombre, grupo: null, pts: 0 };
    }
    
    return null;
  }

  function renderCruceCard(cruce, estado, ganador, res, partido) {
    const localEquipo = cruce.local?.equipo || null;

    const visitLabel = visitEquipo 
      ? `${visitEquipo} ${cruce.visit?.grupo ? `<span class="grupo-badge">${cruce.visit.grupo}</span>` : ''}`
      : 'Por definir';

    const localFlag = localEquipo ? (FLAGS[localEquipo] || '🏳️') : '❓';
    const visitFlag = visitEquipo ? (FLAGS[visitEquipo] || '🏳️') : '❓';

    return `
      <div class="cruce-card ${estado}">
        <div class="cruce-header">
          <span class="cruce-id">${cruce.id}</span>
          <span class="cruce-estado ${estado}">${estado === 'vivo' ? '🔴 EN JUEGO' : estado === 'finalizado' ? '✅ FINALIZADO' : '⏳ PRÓXIMO'}</span>
        </div>
        <div class="cruce-equipos">
          <div class="cruce-equipo ${ganador === 'local' ? 'ganador' : ''}">
            <div class="cruce-equipo-info">
              <span class="flag-sm">${localFlag}</span>
              <span>${localLabel}</span>
            </div>
            ${res && res.local !== null ? `<span class="cruce-equipo-score">${res.local}</span>` : ''}
          </div>
          <div class="cruce-vs">${partido ? `${partido.fecha} · ${partido.hora}` : 'Por definir'}</div>
          <div class="cruce-equipo ${ganador === 'visit' ? 'ganador' : ''}">
            <div class="cruce-equipo-info">
              <span class="flag-sm">${visitFlag}</span>
              <span>${visitLabel}</span>
            </div>
            ${res && res.visit !== null ? `<span class="cruce-equipo-score">${res.visit}</span>` : ''}
          </div>
        </div>
      </div>
    `;
  }

  function renderEliminatorias(resultados, clasificacion) {
    try {
      const contenedor = document.getElementById('contenido-eliminatorias');

      let html = '<div class="eliminatorias-title">FASES ELIMINATORIAS</div>';

  function getEstadoPartido(partido, resultado) {
    if (resultado && resultado.estado) {
      return resultado.estado;
    }
    const kickoff = getKickoffTimestamp(partido);
    const ahora = Date.now();
    const finPartido = kickoff + (120 * 60 * 1000);
    if (ahora < kickoff) return 'proximo';
    if (ahora < finPartido) return 'vivo';
    return 'finalizado';
  }

  async function obtenerTarjetasDesdeAPI(partidoId) {
    try {
      const partidoInfo = PARTIDOS_ID_MAP[partidoId];
      if (!partidoInfo) {
        console.warn(`⚠️ No hay mapeo para el partido ${partidoId}`);
        return null;
      }

      const response = await fetch(
        `${FOOTBALL_DATA_BASE_URL}/competitions/${partidoInfo.competition}/matches?matchday=${partidoInfo.matchday}`,
        {
          headers: {
            'X-Auth-Token': FOOTBALL_DATA_API_KEY
          }
        }
      );

      if (!response.ok) {
        throw new Error(`API error: ${response.status}`);
      }

      const data = await response.json();
      
      const match = data.matches.find(m => 
        m.homeTeam.name === partidoInfo.homeTeam && 
        m.awayTeam.name === partidoInfo.awayTeam
      );

      if (!match) {
        console.warn(`⚠️ Partido ${partidoId} no encontrado en API`);
        return null;
      }

      const tarjetas = {
        amarillas_local: 0,
        rojas_local: 0,
        amarillas_visit: 0,
        rojas_visit: 0
      };

      if (match.events) {
        match.events.forEach(event => {
          if (event.type === 'YELLOW_CARD') {
            if (event.team.id === match.homeTeam.id) {
              tarjetas.amarillas_local++;
            } else {
              tarjetas.amarillas_visit++;
            }
          } else if (event.type === 'RED_CARD') {
            if (event.team.id === match.homeTeam.id) {
              tarjetas.rojas_local++;
            } else {
              tarjetas.rojas_visit++;
            }
          }
        });
      }

      console.log(`✅ Tarjetas obtenidas para ${partidoId}:`, tarjetas);
      return tarjetas;

    } catch (error) {
      console.error(`❌ Error obteniendo tarjetas para ${partidoId}:`, error);
      return null;
    }
  }

  async function sincronizarTarjetasConAPI() {
    console.log("🔄 Sincronizando tarjetas desde API...");
    
    try {
      const { data: resultados, error } = await supabase
        .from('resultados')
        .select('*');

      if (error) throw error;

      for (const resultado of resultados) {
        if (resultado.amarillas_local !== null && resultado.amarillas_local !== undefined) {
          continue;
        }

        const tarjetas = await obtenerTarjetasDesdeAPI(resultado.partido_id);
        
        if (tarjetas) {
          const { error: updateError } = await supabase
            .from('resultados')
            .update({
              amarillas_local: tarjetas.amarillas_local,
              rojas_local: tarjetas.rojas_local,
              amarillas_visit: tarjetas.amarillas_visit,
              rojas_visit: tarjetas.rojas_visit
            })
            .eq('partido_id', resultado.partido_id);

          if (updateError) {
            console.error(`Error actualizando ${resultado.partido_id}:`, updateError);
          } else {
            console.log(`✅ Actualizado ${resultado.partido_id}`);
          }

          await new Promise(resolve => setTimeout(resolve, 6000));
        }
      }

      console.log("✅ Sincronización completada");
    } catch (err) {
      console.error("❌ Error en sincronización:", err);
    }
  }

  window.sincronizarTarjetas = sincronizarTarjetasConAPI;

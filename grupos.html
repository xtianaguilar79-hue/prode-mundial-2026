<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clasificación · Prode Mundial 2026</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .grupos-container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
    .hero-grupos { text-align: center; margin-bottom: 40px; }
    .hero-grupos h1 { font-family: 'Anton', sans-serif; font-size: 42px; color: var(--gold); letter-spacing: 2px; }
    .hero-grupos p { color: var(--text2); font-size: 16px; }

    .grupo-section { margin-bottom: 40px; }
    .grupo-title { 
      font-family: 'Anton', sans-serif; 
      font-size: 24px; 
      color: var(--gold); 
      margin-bottom: 16px; 
      padding-bottom: 8px; 
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .tabla-wrap { overflow-x: auto; border-radius: var(--r); border: 1px solid var(--border); background: var(--card); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: var(--bg2); color: var(--text2); padding: 12px 8px; text-align: center; font-size: 11px; text-transform: uppercase; }
    th:first-child, td:first-child { text-align: center; width: 40px; padding-left: 16px; }
    th.left, td.left { text-align: left; }
    td { padding: 12px 8px; border-bottom: 1px solid var(--border); color: var(--text); font-size: 14px; }
    tr:last-child td { border-bottom: none; }
    
    tr.pos-1 td, tr.pos-2 td { font-weight: 700; color: var(--gold); }
    tr.pos-1 { background: rgba(255, 201, 60, 0.05); }
    
    .equipo-cell { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    .flag-sm { font-size: 16px; }

    .actualizado { text-align: center; font-size: 12px; color: var(--text3); margin-top: 40px; }

    /* ═══════════════════════════════════════════════════════ */
    /* BRACKET STYLE */
    /* ═══════════════════════════════════════════════════════ */
    .bracket-container {
      overflow-x: auto;
      padding: 20px 0;
    }

    .bracket {
      display: flex;
      gap: 20px;
      min-width: 1200px;
    }

    .bracket-round {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      min-width: 250px;
    }

    .round-title {
      font-family: 'Anton', sans-serif;
      font-size: 18px;
      color: var(--gold);
      text-align: center;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .bracket-match {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--r);
      padding: 12px;
      margin-bottom: 12px;
      position: relative;
      transition: all 0.3s ease;
    }

    .bracket-match:hover {
      border-color: var(--gold);
      box-shadow: 0 0 15px rgba(255, 201, 60, 0.3);
    }

    .bracket-match.winner {
      border-color: var(--gold);
      background: rgba(255, 201, 60, 0.1);
    }

    .match-team {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
    }

    .match-team.winner {
      font-weight: 700;
      color: var(--gold);
    }

    .team-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .team-flag {
      font-size: 16px;
    }

    .match-score {
      font-family: 'Anton', sans-serif;
      font-size: 16px;
      color: var(--gold);
    }

    .match-connector {
      position: absolute;
      right: -20px;
      top: 50%;
      width: 20px;
      height: 2px;
      background: var(--border);
    }

    @media (max-width: 600px) {
      .hero-grupos h1 { font-size: 32px; }
      table { font-size: 12px; }
      th, td { padding: 8px 4px; }
      .cruces-grid { grid-template-columns: 1fr; }
      .clasificados-grid { grid-template-columns: 1fr; }
      .bracket { min-width: 900px; }
      .bracket-round { min-width: 200px; }
    }
  </style>
</head>

<footer style="text-align:center; padding:30px; color:var(--text2); font-size:12px; border-top:1px solid var(--border); margin-top:40px">
  Prode Mundial 2026 · Tablas de Posiciones
</footer>

<script type="module">
  import { supabase } from "./js/supabase-config.js";
  import { PARTIDOS_GRUPOS, PARTIDOS_ELIM, TODOS_PARTIDOS, FLAGS, getKickoffTimestamp } from "./datos-partidos.js";

  const RANKING_FIFA = {
    "Argentina": 1, "España": 2, "Francia": 3, "Inglaterra": 4,
    "Portugal": 5, "Brasil": 6, "Marruecos": 7, "Países Bajos": 8,
    "Bélgica": 9, "Alemania": 10, "Croacia": 11, "México": 13,
    "Colombia": 14, "Senegal": 15, "Uruguay": 16, "Estados Unidos": 17,
    "Japón": 18, "Suiza": 19, "Irán": 20, "Turquía": 22,
    "Ecuador": 23, "Austria": 24, "Corea del Sur": 25, "Australia": 27,
    "Argelia": 28, "Egipto": 29, "Canadá": 30, "Noruega": 31,
    "Costa de Marfil": 33, "Panamá": 34, "Suecia": 38, "Rep. Checa": 40,
    "Paraguay": 41, "Escocia": 42, "Túnez": 45, "RD Congo": 46,
    "Uzbekistán": 50, "Qatar": 56, "Irak": 57, "Arabia Saudita": 60,
    "Sudáfrica": 61, "Jordania": 63, "Bosnia-Herzegovina": 64,
    "Cabo Verde": 67, "Ghana": 73, "Curazao": 82, "Haití": 83,
    "Nueva Zelanda": 85
  };

  const CRUCES_TERCIEROS_FIFA = {
    'M079': ['C', 'E', 'F', 'H', 'I'],
    'M080': ['E', 'H', 'I', 'J', 'K'],
    'M081': ['A', 'E', 'H', 'I', 'J'],
    'M085': ['E', 'F', 'G', 'I', 'J'],
    'M088': ['D', 'E', 'I', 'J', 'L']
  };

  const ESTRUCTURA_16AVOS = [
    { id: 'M073', local: 'Sudáfrica', visit: 'Canadá' },
    { id: 'M074', local: 'Brasil', visit: 'Japón' },
    { id: 'M075', local: 'Alemania', visit: 'Paraguay' },
    { id: 'M076', local: 'Países Bajos', visit: 'Marruecos' },
    { id: 'M077', local: 'Costa de Marfil', visit: 'Noruega' },
    { id: 'M078', local: 'Francia', visit: 'Suecia' },
    { id: 'M079', local: 'México', visit: '3°' },
    { id: 'M080', local: '1°L', visit: '3°' },
    { id: 'M081', local: 'Bélgica', visit: '3°' },
    { id: 'M082', local: 'Estados Unidos', visit: 'Bosnia-Herzegovina' },
    { id: 'M083', local: 'España', visit: '2°J' },
    { id: 'M084', local: '2°K', visit: '2°L' },
    { id: 'M085', local: 'Suiza', visit: '3°' },
    { id: 'M086', local: 'Australia', visit: 'Egipto' },
    { id: 'M087', local: 'Argentina', visit: 'Cabo Verde' },
    { id: 'M088', local: '1°K', visit: '3°' }
  ];

  const ESTRUCTURA_OCTAVOS = [
    { id: 'M089', local: 'G073', visit: 'G074' },
    { id: 'M090', local: 'G075', visit: 'G076' },
    { id: 'M091', local: 'G077', visit: 'G078' },
    { id: 'M092', local: 'G079', visit: 'G080' },
    { id: 'M093', local: 'G081', visit: 'G082' },
    { id: 'M094', local: 'G083', visit: 'G084' },
    { id: 'M095', local: 'G085', visit: 'G086' },
    { id: 'M096', local: 'G087', visit: 'G088' }
  ];

  const ESTRUCTURA_CUARTOS = [
    { id: 'M097', local: 'G089', visit: 'G090' },
    { id: 'M098', local: 'G091', visit: 'G092' },
    { id: 'M099', local: 'G093', visit: 'G094' },
    { id: 'M100', local: 'G095', visit: 'G096' }
  ];

  const ESTRUCTURA_SEMIS = [
    { id: 'M101', local: 'G097', visit: 'G098' },
    { id: 'M102', local: 'G099', visit: 'G100' }
  ];

  const ESTRUCTURA_FINAL = [
    { id: 'M103', local: 'P101', visit: 'P102' },
    { id: 'M104', local: 'G101', visit: 'G102' }
  ];

  // ═══════════════════════════════════════════════════════
  // FUNCIONES AUXILIARES
  // ═══════════════════════════════════════════════════════

  function initEquipo(tabla, nombre) {
    tabla[nombre] = { equipo: nombre, pj: 0, pg: 0, pe: 0, pp: 0, gf: 0, gc: 0, dg: 0, pts: 0 };
  }

  function actualizarStats(eq, golesFavor, golesContra) {
    eq.pj++;
    eq.gf += golesFavor;
    eq.gc += golesContra;
    eq.dg = eq.gf - eq.gc;
    if (golesFavor > golesContra) { eq.pg++; eq.pts += 3; }
    else if (golesFavor === golesContra) { eq.pe++; eq.pts += 1; }
    else { eq.pp++; }
  }

  function calcularEstadisticasDirectas(equipoA, equipoB, partidosGrupo, resultados) {
    const statsA = { pts: 0, gf: 0, gc: 0, dg: 0 };
    const statsB = { pts: 0, gf: 0, gc: 0, dg: 0 };

    partidosGrupo.forEach(p => {
      const entreEllos = 
        (p.local === equipoA && p.visit === equipoB) ||
        (p.local === equipoB && p.visit === equipoA);
      
      if (!entreEllos) return;
      
      const res = resultados.find(r => r.partido_id === p.id);
      if (!res || res.local === null || res.visit === null) return;

      const gL = parseInt(res.local);
      const gV = parseInt(res.visit);

      if (p.local === equipoA) {
        statsA.gf += gL; statsA.gc += gV; statsA.dg += (gL - gV);
        statsB.gf += gV; statsB.gc += gL; statsB.dg += (gV - gL);
        if (gL > gV) statsA.pts += 3;
        else if (gV > gL) statsB.pts += 3;
        else { statsA.pts += 1; statsB.pts += 1; }
      } else {
        statsB.gf += gL; statsB.gc += gV; statsB.dg += (gL - gV);
        statsA.gf += gV; statsA.gc += gL; statsA.dg += (gV - gL);
        if (gL > gV) statsB.pts += 3;
        else if (gV > gL) statsA.pts += 3;
        else { statsB.pts += 1; statsA.pts += 1; }
      }
    });

    return { statsA, statsB };
  }

  function calcularFairPlay(equipo, partidosGrupo, resultados) {
    let puntos = 0;
    partidosGrupo.forEach(p => {
      const res = resultados.find(r => r.partido_id === p.id);
      if (!res) return;
      if (p.local === equipo) {
        puntos += (parseInt(res.amarillas_local) || 0) * -1 + (parseInt(res.rojas_local) || 0) * -4;
      } else if (p.visit === equipo) {
        puntos += (parseInt(res.amarillas_visit) || 0) * -1 + (parseInt(res.rojas_visit) || 0) * -4;
      }
    });
    return puntos;
  }

  function compararEquipos(a, b, tabla, partidosGrupo, resultados) {
    if (b.pts !== a.pts) return b.pts - a.pts;
    const { statsA, statsB } = calcularEstadisticasDirectas(a.equipo, b.equipo, partidosGrupo, resultados);
    if (statsB.pts !== statsA.pts) return statsB.pts - statsA.pts;
    if (statsB.dg !== statsA.dg) return statsB.dg - statsA.dg;
    if (statsB.gf !== statsA.gf) return statsB.gf - statsA.gf;
    if (b.dg !== a.dg) return b.dg - a.dg;
    if (b.gf !== a.gf) return b.gf - a.gf;
    const fairPlayA = calcularFairPlay(a.equipo, partidosGrupo, resultados);
    const fairPlayB = calcularFairPlay(b.equipo, partidosGrupo, resultados);
    if (fairPlayA !== fairPlayB) return fairPlayB - fairPlayA;
    return (RANKING_FIFA[a.equipo] || 100) - (RANKING_FIFA[b.equipo] || 100);
  }

  function calcularClasificacion(resultados) {
    const GRUPOS = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];
    const clasificacion = {};

    GRUPOS.forEach(grupo => {
      const partidosGrupo = PARTIDOS_GRUPOS.filter(p => p.grupo === grupo);
      const tabla = {};

      partidosGrupo.forEach(p => {
        if (!tabla[p.local]) initEquipo(tabla, p.local);
        if (!tabla[p.visit]) initEquipo(tabla, p.visit);
        const res = resultados.find(r => r.partido_id === p.id);
        if (res && res.local !== null && res.visit !== null) {
          actualizarStats(tabla[p.local], parseInt(res.local), parseInt(res.visit));
          actualizarStats(tabla[p.visit], parseInt(res.visit), parseInt(res.local));
        }
      });

      const ordenados = Object.values(tabla).sort((a, b) => 
        compararEquipos(a, b, tabla, partidosGrupo, resultados)
      );

      clasificacion[grupo] = {
        primero: ordenados[0]?.equipo || null,
        segundo: ordenados[1]?.equipo || null,
        tercero: ordenados[2]?.equipo || null,
        stats: ordenados
      };
    });

    return clasificacion;
  }

  function obtenerMejoresTerceros(clasificacion, resultados) {
    return Object.entries(clasificacion)
      .map(([grupo, data]) => {
        const equipo = data.tercero;
        if (!equipo) return null;
        const partidosGrupo = PARTIDOS_GRUPOS.filter(p => p.grupo === grupo);
        const statsEquipo = data.stats.find(s => s.equipo === equipo);
        return {
          grupo, equipo,
          pts: statsEquipo?.pts || 0,
          dg: statsEquipo?.dg || 0,
          gf: statsEquipo?.gf || 0,
          fairPlay: calcularFairPlay(equipo, partidosGrupo, resultados),
          rankingFifa: RANKING_FIFA[equipo] || 100
        };
      })
      .filter(t => t !== null)
      .sort((a, b) => {
        if (b.pts !== a.pts) return b.pts - a.pts;
        if (b.dg !== a.dg) return b.dg - a.dg;
        if (b.gf !== a.gf) return b.gf - a.gf;
        if (b.fairPlay !== a.fairPlay) return b.fairPlay - a.fairPlay;
        return a.rankingFifa - b.rankingFifa;
      })
      .slice(0, 8);
  }

  // ═══════════════════════════════════════════════════════
  // VERIFICAR SI TERMINÓ LA FASE DE GRUPOS
  // ═══════════════════════════════════════════════════════
  
  function faseDeGruposTerminada(resultados) {
    const partidosGrupos = PARTIDOS_GRUPOS;
    const partidosConResultado = partidosGrupos.filter(p => {
      const res = resultados.find(r => r.partido_id === p.id);
      return res && res.local !== null && res.visit !== null;
    });
    
    return partidosConResultado.length === partidosGrupos.length;
  }

  // ═══════════════════════════════════════════════════════
  // RESOLVER GANADOR DE UN PARTIDO
  // ═══════════════════════════════════════════════════════
  
  function resolverGanador(partidoId, resultados) {
    const res = resultados.find(r => r.partido_id === partidoId);
    if (!res || res.local === null || res.visit === null) return null;
    
    const gL = parseInt(res.local);
    const gV = parseInt(res.visit);
    
    if (gL > gV) return 'local';
    if (gV > gL) return 'visit';
    
    // Si hay empate, ver alargue
    if (res.alargue_local !== null && res.alargue_visit !== null) {
      const alL = parseInt(res.alargue_local);
      const alV = parseInt(res.alargue_visit);
      if (alL > alV) return 'local';
      if (alV > alL) return 'visit';
      
      // Si sigue empate, ver penales
      if (res.penales_local !== null && res.penales_visit !== null) {
        return parseInt(res.penales_local) > parseInt(res.penales_visit) ? 'local' : 'visit';
      }
    }
    
    return null; // Empate sin definir
  }

  // ═══════════════════════════════════════════════════════
  // OBTENER EQUIPO DE UN CRUCE
  // ═══════════════════════════════════════════════════════
  
  function obtenerEquipoDeCruce(posicion, resultados, clasificacion, tercerosAsignados) {
    if (!posicion) return null;
    if (typeof posicion === 'object' && posicion.equipo) return posicion;
    
    // Si es un equipo directo (no posición)
    if (!posicion.startsWith('G') && !posicion.startsWith('P') && 
        !posicion.startsWith('1°') && !posicion.startsWith('2°') && 
        !posicion.startsWith('3°')) {
      return { equipo: posicion, grupo: null };
    }
    
    // Si es ganador de un partido de 16avos (G073, G074, etc.)
    if (posicion.startsWith('G07')) {
      const partidoId = 'M' + posicion.substring(1);
      const ganador = resolverGanador(partidoId, resultados);
      if (!ganador) return null;
      
      const partido = ESTRUCTURA_16AVOS.find(p => p.id === partidoId);
      if (!partido) return null;
      
      const equipoNombre = ganador === 'local' ? partido.local : partido.visit;
      return { equipo: equipoNombre, grupo: null };
    }
    
    // Si es ganador de octavos (G089, G090, etc.)
    if (posicion.startsWith('G08') || posicion.startsWith('G09')) {
      const partidoId = 'M' + posicion.substring(1);
      const ganador = resolverGanador(partidoId, resultados);
      if (!ganador) return null;
      
      const partido = ESTRUCTURA_OCTAVOS.find(p => p.id === partidoId) || 
                      ESTRUCTURA_CUARTOS.find(p => p.id === partidoId);
      if (!partido) return null;
      
      const local = obtenerEquipoDeCruce(partido.local, resultados, clasificacion, tercerosAsignados);
      const visit = obtenerEquipoDeCruce(partido.visit, resultados, clasificacion, tercerosAsignados);
      
      if (!local || !visit) return null;
      
      const equipoNombre = ganador === 'local' ? local.equipo : visit.equipo;
      return { equipo: equipoNombre, grupo: null };
    }
    
    // Si es perdedor de semis (P101, P102)
    if (posicion.startsWith('P')) {
      const partidoId = 'M' + posicion.substring(1);
      const ganador = resolverGanador(partidoId, resultados);
      if (!ganador) return null;
      
      const partido = ESTRUCTURA_SEMIS.find(p => p.id === partidoId);
      if (!partido) return null;
      
      const local = obtenerEquipoDeCruce(partido.local, resultados, clasificacion, tercerosAsignados);
      const visit = obtenerEquipoDeCruce(partido.visit, resultados, clasificacion, tercerosAsignados);
      
      if (!local || !visit) return null;
      
      const perdedorNombre = ganador === 'local' ? visit.equipo : local.equipo;
      return { equipo: perdedorNombre, grupo: null };
    }
    
    // Si es ganador de cuartos (G097, G098, etc.)
    if (posicion.startsWith('G09') && !posicion.startsWith('G097') && !posicion.startsWith('G098')) {
      const partidoId = 'M' + posicion.substring(1);
      const ganador = resolverGanador(partidoId, resultados);
      if (!ganador) return null;
      
      const partido = ESTRUCTURA_CUARTOS.find(p => p.id === partidoId);
      if (!partido) return null;
      
      const local = obtenerEquipoDeCruce(partido.local, resultados, clasificacion, tercerosAsignados);
      const visit = obtenerEquipoDeCruce(partido.visit, resultados, clasificacion, tercerosAsignados);
      
      if (!local || !visit) return null;
      
      const equipoNombre = ganador === 'local' ? local.equipo : visit.equipo;
      return { equipo: equipoNombre, grupo: null };
    }
    
    // Si es ganador de semis (G101, G102)
    if (posicion.startsWith('G10')) {
      const partidoId = 'M' + posicion.substring(1);
      const ganador = resolverGanador(partidoId, resultados);
      if (!ganador) return null;
      
      const partido = ESTRUCTURA_SEMIS.find(p => p.id === partidoId);
      if (!partido) return null;
      
      const local = obtenerEquipoDeCruce(partido.local, resultados, clasificacion, tercerosAsignados);
      const visit = obtenerEquipoDeCruce(partido.visit, resultados, clasificacion, tercerosAsignados);
      
      if (!local || !visit) return null;
      
      const equipoNombre = ganador === 'local' ? local.equipo : visit.equipo;
      return { equipo: equipoNombre, grupo: null };
    }
    
    // Si es 1° de grupo
    if (posicion.startsWith('1°')) {
      const grupo = posicion.substring(2);
      const equipo = clasificacion[grupo]?.primero;
      return equipo ? { equipo, grupo } : null;
    }
    
    // Si es 2° de grupo
    if (posicion.startsWith('2°')) {
      const grupo = posicion.substring(2);
      const equipo = clasificacion[grupo]?.segundo;
      return equipo ? { equipo, grupo } : null;
    }
    
    // Si es 3° de grupo
    if (posicion === '3°' && tercerosAsignados) {
      return tercerosAsignados;
    }
    
    return null;
  }

  // ═══════════════════════════════════════════════════════
  // DETERMINAR CRUCES DE 16AVOS
  // ═══════════════════════════════════════════════════════

  function determinarCruces16avos(clasificacion) {
    try {
      const tercerosOrdenados = obtenerMejoresTerceros(clasificacion, []);
      const tercerosAsignados = {};
      
      // Asignar terceros según FIFA
      Object.entries(CRUCES_TERCIEROS_FIFA).forEach(([cruceId, gruposPermitidos], index) => {
        if (index < tercerosOrdenados.length) {
          const tercero = tercerosOrdenados[index];
          if (gruposPermitidos.includes(tercero.grupo)) {
            tercerosAsignados[cruceId] = tercero;
          }
        }
      });
      
      const cruces = ESTRUCTURA_16AVOS.map(estructura => {
        let local = null;
        let visit = null;

        if (!estructura.local.startsWith('1°') && !estructura.local.startsWith('2°') && !estructura.local.startsWith('3°')) {
          local = { equipo: estructura.local, grupo: null };
        } else if (estructura.local.startsWith('1°')) {
          const grupo = estructura.local.substring(2);
          local = { equipo: clasificacion[grupo]?.primero || null, grupo };
        } else if (estructura.local.startsWith('2°')) {
          const grupo = estructura.local.substring(2);
          local = { equipo: clasificacion[grupo]?.segundo || null, grupo };
        }

        if (!estructura.visit.startsWith('1°') && !estructura.visit.startsWith('2°') && !estructura.visit.startsWith('3°')) {
          visit = { equipo: estructura.visit, grupo: null };
        } else if (estructura.visit.startsWith('1°')) {
          const grupo = estructura.visit.substring(2);
          visit = { equipo: clasificacion[grupo]?.primero || null, grupo };
        } else if (estructura.visit.startsWith('2°')) {
          const grupo = estructura.visit.substring(2);
          visit = { equipo: clasificacion[grupo]?.segundo || null, grupo };
        } else if (estructura.visit === '3°') {
          visit = tercerosAsignados[estructura.id] || null;
        }

        return { id: estructura.id, local, visit };
      });

      return { cruces, tercerosAsignados };
    } catch (err) {
      console.error("Error en determinarCruces16avos:", err);
      return { cruces: [], tercerosAsignados: {} };
    }
  }

      const { data: resultados, error } = await supabase
        .from('resultados')
        .select('*');

        console.error("Error al cargar resultados:", error);
        throw error;
      }

      console.log("✅ Resultados cargados:", resultados?.length || 0);

      const clasificacion = calcularClasificacion(resultados || []);
      const terminoFaseGrupos = faseDeGruposTerminada(resultados || []);
      
      if (terminoFaseGrupos) {
        // Mostrar bracket completo
        document.getElementById('contenido-clasificados').style.display = 'none';

          grupo, equipo,
          pts: statsEquipo?.pts || 0,
          dg: statsEquipo?.dg || 0,
          gf: statsEquipo?.gf || 0,

  function renderTablas(resultados) {

      GRUPOS.forEach(grupo => {
        const partidosGrupo = PARTIDOS_GRUPOS.filter(p => p.grupo === grupo);
        const tabla = {};

        partidosGrupo.forEach(p => {
          if (!tabla[p.local]) initEquipo(tabla, p.local);
          if (!tabla[p.visit]) initEquipo(tabla, p.visit);
          const res = resultados.find(r => r.partido_id === p.id);
          if (res && res.local !== null && res.visit !== null) {
            actualizarStats(tabla[p.local], parseInt(res.local), parseInt(res.visit));
            actualizarStats(tabla[p.visit], parseInt(res.visit), parseInt(res.local));

        const clasificados = Object.values(tabla).sort((a, b) =>

        html += `

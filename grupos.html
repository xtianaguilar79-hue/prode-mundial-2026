<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clasificación · Prode Mundial 2026</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .grupos-container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    .hero-grupos { text-align: center; margin-bottom: 40px; }
    .hero-grupos h1 { font-family: 'Anton', sans-serif; font-size: 42px; color: var(--gold); letter-spacing: 2px; }
    .hero-grupos p { color: var(--text2); font-size: 16px; }

    .grupo-section { margin-bottom: 40px; }
    .grupo-title { 
      font-family: 'Anton', sans-serif; 
      font-size: 24px; 
      color: var(--gold); 
      margin-bottom: 16px; 
      padding-bottom: 8px; 
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .tabla-wrap { overflow-x: auto; border-radius: var(--r); border: 1px solid var(--border); background: var(--card); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: var(--bg2); color: var(--text2); padding: 12px 8px; text-align: center; font-size: 11px; text-transform: uppercase; }
    th:first-child, td:first-child { text-align: center; width: 40px; padding-left: 16px; }
    th.left, td.left { text-align: left; }
    td { padding: 12px 8px; border-bottom: 1px solid var(--border); color: var(--text); font-size: 14px; }
    tr:last-child td { border-bottom: none; }
    
    tr.pos-1 td, tr.pos-2 td { font-weight: 700; color: var(--gold); }
    tr.pos-1 { background: rgba(255, 201, 60, 0.05); }
    
    .equipo-cell { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    .flag-sm { font-size: 16px; }

    .actualizado { text-align: center; font-size: 12px; color: var(--text3); margin-top: 40px; }

    /* ═══ ESTILOS CRUCES ELIMINATORIOS ═══ */
    .eliminatorias-section { margin-top: 60px; }
    .eliminatorias-title {
      font-family: 'Anton', sans-serif;
      font-size: 32px;
      color: var(--gold);
      text-align: center;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }
    .fase-title {
      font-family: 'Anton', sans-serif;
      font-size: 22px;
      color: var(--text);
      margin: 30px 0 20px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border);
    }
    .cruces-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }
    .cruce-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px;
      box-shadow: var(--shadow-sm);
    }
    .cruce-card.finalizado { border-color: var(--green); }
    .cruce-card.en-vivo { border-color: var(--gold); box-shadow: 0 0 20px rgba(255, 201, 60, 0.2); }
    
    .cruce-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 11px;
      color: var(--text2);
    }
    .cruce-id { font-weight: 700; color: var(--gold); }
    .cruce-estado {
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
    }
    .cruce-estado.proximo { background: var(--bg2); color: var(--text2); }
    .cruce-estado.vivo { background: var(--gold); color: #000; }
    .cruce-estado.finalizado { background: var(--green-soft); color: var(--green); }
    
    .cruce-equipos {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .cruce-equipo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      border-radius: 6px;
      background: var(--bg2);
    }
    .cruce-equipo.ganador { background: rgba(255, 201, 60, 0.15); }
    .cruce-equipo-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }
    .cruce-equipo-score {
      font-family: 'Anton', sans-serif;
      font-size: 20px;
      color: var(--gold);
    }
    .cruce-vs {
      text-align: center;
      font-size: 11px;
      color: var(--text3);
      padding: 4px 0;
    }
    .cruce-placeholder {
      color: var(--text3);
      font-style: italic;
    }

    @media (max-width: 600px) {
      .hero-grupos h1 { font-size: 32px; }
      table { font-size: 12px; }
      th, td { padding: 8px 4px; }
      .cruces-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="brand">
    <span class="copa">🏆</span>
    <div>
      <h1>PRODE MUNDIAL 2026</h1>
      <p>📊 Tablas de Clasificación</p>
    </div>
  </div>
  <nav class="nav">
    <a href="index.html">🏠 Inicio</a>
    <a href="instructivo.html">📘 Reglamento</a>
    <a href="index.html#ranking">🏅 Ranking</a>
    <a href="chat.html">💬 Chat</a>
    <a href="grupos.html" style="color:var(--gold); font-weight:700;">📊 Grupos</a>
    <a href="login.html">🔐 Ingresar</a>
  </nav>
</header>

<main class="grupos-container">
  <div class="hero-grupos">
    <h1>CLASIFICACIÓN</h1>
    <p>Posiciones actualizadas en tiempo real según los resultados oficiales</p>
  </div>

  <div id="loader" style="text-align:center; padding:40px;">
    <div class="spinner"></div> Cargando tablas...
  </div>

  <div id="contenido-grupos"></div>

  <div id="contenido-eliminatorias" class="eliminatorias-section" style="display:none;"></div>

  <p class="actualizado" id="txt-actualizado"></p>
</main>

<footer style="text-align:center; padding:30px; color:var(--text2); font-size:12px; border-top:1px solid var(--border); margin-top:40px">
  Prode Mundial 2026 · Tablas de Posiciones
</footer>

<script type="module">
  import { supabase } from "./js/supabase-config.js";
  import { PARTIDOS_GRUPOS, PARTIDOS_ELIM, TODOS_PARTIDOS, FLAGS, getKickoffTimestamp } from "./datos-partidos.js";

  // ═══════════════════════════════════════════════════════
  // INICIALIZACIÓN
  // ═══════════════════════════════════════════════════════
  (async () => {
    try {
      const { data: resultados, error } = await supabase
        .from('resultados')
        .select('*')
        .eq('es_prueba', false);

      if (error) throw error;

      renderTablas(resultados || []);
      renderEliminatorias(resultados || []);
      
      document.getElementById('loader').style.display = 'none';
      document.getElementById('txt-actualizado').textContent = `Última actualización: ${new Date().toLocaleTimeString()}`;
    } catch (err) {
      console.error(err);
      document.getElementById('loader').innerHTML = '<p style="color:var(--red)">Error al cargar datos</p>';
    }
  })();

  // ═══════════════════════════════════════════════════════
  // TABLAS DE GRUPOS (EXISTENTE)
  // ═══════════════════════════════════════════════════════
  function renderTablas(resultados) {
    const contenedor = document.getElementById('contenido-grupos');
    const GRUPOS = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];
    let html = "";

    GRUPOS.forEach(grupo => {
      const partidosGrupo = PARTIDOS_GRUPOS.filter(p => p.grupo === grupo);
      const tabla = {};

      partidosGrupo.forEach(p => {
        if (!tabla[p.local]) initEquipo(tabla, p.local);
        if (!tabla[p.visit]) initEquipo(tabla, p.visit);

        const res = resultados.find(r => r.partido_id === p.id);
        if (res && res.local !== null && res.visit !== null) {
          const gL = parseInt(res.local);
          const gV = parseInt(res.visit);
          actualizarStats(tabla[p.local], gL, gV);
          actualizarStats(tabla[p.visit], gV, gL);
        }
      });

      const clasificados = Object.values(tabla).sort((a, b) => {
        if (b.pts !== a.pts) return b.pts - a.pts;
        if (b.dg !== a.dg) return b.dg - a.dg;
        return b.gf - a.gf;
      });

      html += `
        <div class="grupo-section">
          <div class="grupo-title">GRUPO ${grupo}</div>
          <div class="tabla-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th class="left">Equipo</th>
                  <th>PTS</th>
                  <th>PJ</th>
                  <th>PG</th>
                  <th>PE</th>
                  <th>PP</th>
                  <th>GF</th>
                  <th>GC</th>
                  <th>DG</th>
                </tr>
              </thead>
              <tbody>
                ${clasificados.map((eq, i) => `
                  <tr class="pos-${i + 1}">
                    <td>${i + 1}</td>
                    <td class="left">
                      <div class="equipo-cell">
                        <span class="flag-sm">${FLAGS[eq.equipo] || "🏳️"}</span>
                        <span>${eq.equipo}</span>
                      </div>
                    </td>
                    <td>${eq.pts}</td>
                    <td>${eq.pj}</td>
                    <td>${eq.pg}</td>
                    <td>${eq.pe}</td>
                    <td>${eq.pp}</td>
                    <td>${eq.gf}</td>
                    <td>${eq.gc}</td>
                    <td>${eq.dg > 0 ? '+' + eq.dg : eq.dg}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    });

    contenedor.innerHTML = html;
  }

  function initEquipo(tabla, nombre) {
    tabla[nombre] = { equipo: nombre, pj: 0, pg: 0, pe: 0, pp: 0, gf: 0, gc: 0, dg: 0, pts: 0 };
  }

  function actualizarStats(eq, golesFavor, golesContra) {
    eq.pj++;
    eq.gf += golesFavor;
    eq.gc += golesContra;
    eq.dg = eq.gf - eq.gc;
    if (golesFavor > golesContra) { eq.pg++; eq.pts += 3; }
    else if (golesFavor === golesContra) { eq.pe++; eq.pts += 1; }
    else { eq.pp++; }
  }

  // ═══════════════════════════════════════════════════════
  // CRUCES ELIMINATORIOS (NUEVO)
  // ═══════════════════════════════════════════════════════
  function renderEliminatorias(resultados) {
    const contenedor = document.getElementById('contenido-eliminatorias');
    
    // 1. Calcular clasificación de grupos
    const clasificacion = calcularClasificacion(resultados);
    
    // 2. Determinar equipos de 16avos
    const equipos16avos = determinarEquipos16avos(clasificacion);
    
    // 3. Renderizar cada fase
    const fases = [
      { id: '16avos', nombre: 'DIECISEISAVOS DE FINAL', partidos: PARTIDOS_ELIM.filter(p => p.fase === '16avos') },
      { id: 'octavos', nombre: 'OCTAVOS DE FINAL', partidos: PARTIDOS_ELIM.filter(p => p.fase === 'octavos') },
      { id: 'cuartos', nombre: 'CUARTOS DE FINAL', partidos: PARTIDOS_ELIM.filter(p => p.fase === 'cuartos') },
      { id: 'semis', nombre: 'SEMIFINALES', partidos: PARTIDOS_ELIM.filter(p => p.fase === 'semis') },
      { id: '3er', nombre: 'TERCER PUESTO', partidos: PARTIDOS_ELIM.filter(p => p.fase === '3er') },
      { id: 'final', nombre: '🏆 FINAL', partidos: PARTIDOS_ELIM.filter(p => p.fase === 'final') },
    ];

    let html = '<div class="eliminatorias-title">FASES ELIMINATORIAS</div>';

    fases.forEach(fase => {
      html += `<div class="fase-title">${fase.nombre}</div>`;
      html += '<div class="cruces-grid">';
      
      fase.partidos.forEach(p => {
        const res = resultados.find(r => r.partido_id === p.id);
        const estado = getEstadoPartido(p, res);
        
        // Determinar equipos
        const equipoLocal = obtenerEquipo(p.local, equipos16avos, resultados);
        const equipoVisit = obtenerEquipo(p.visit, equipos16avos, resultados);
        
        // Determinar ganador
        let ganador = null;
        if (res && res.local !== null && res.visit !== null) {
          const gL = parseInt(res.local);
          const gV = parseInt(res.visit);
          if (gL > gV) ganador = 'local';
          else if (gV > gL) ganador = 'visit';
          else if (res.alargue_local !== null && res.alargue_visit !== null) {
            const alL = parseInt(res.alargue_local);
            const alV = parseInt(res.alargue_visit);
            if (alL > alV) ganador = 'local';
            else if (alV > alL) ganador = 'visit';
            else if (res.penales_local !== null && res.penales_visit !== null) {
              ganador = parseInt(res.penales_local) > parseInt(res.penales_visit) ? 'local' : 'visit';
            }
          }
        }

        html += `
          <div class="cruce-card ${estado}">
            <div class="cruce-header">
              <span class="cruce-id">${p.id}</span>
              <span class="cruce-estado ${estado}">${estado === 'vivo' ? '🔴 EN JUEGO' : estado === 'finalizado' ? '✅ FINALIZADO' : '⏳ PRÓXIMO'}</span>
            </div>
            <div class="cruce-equipos">
              <div class="cruce-equipo ${ganador === 'local' ? 'ganador' : ''}">
                <div class="cruce-equipo-info">
                  <span class="flag-sm">${equipoLocal ? FLAGS[equipoLocal] || '🏳️' : ''}</span>
                  <span>${equipoLocal || '<span class="cruce-placeholder">Por definir</span>'}</span>
                </div>
                ${res && res.local !== null ? `<span class="cruce-equipo-score">${res.local}</span>` : ''}
              </div>
              <div class="cruce-vs">${res && res.local !== null ? 'vs' : p.fecha + ' · ' + p.hora}</div>
              <div class="cruce-equipo ${ganador === 'visit' ? 'ganador' : ''}">
                <div class="cruce-equipo-info">
                  <span class="flag-sm">${equipoVisit ? FLAGS[equipoVisit] || '🏳️' : '❓'}</span>
                  <span>${equipoVisit || '<span class="cruce-placeholder">Por definir</span>'}</span>
                </div>
                ${res && res.visit !== null ? `<span class="cruce-equipo-score">${res.visit}</span>` : ''}
              </div>
            </div>
          </div>
        `;
      });
      
      html += '</div>';
    });

    contenedor.innerHTML = html;
    contenedor.style.display = 'block';
  }

  function calcularClasificacion(resultados) {
    const GRUPOS = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];
    const clasificacion = {};

    GRUPOS.forEach(grupo => {
      const partidosGrupo = PARTIDOS_GRUPOS.filter(p => p.grupo === grupo);
      const tabla = {};

      partidosGrupo.forEach(p => {
        if (!tabla[p.local]) initEquipo(tabla, p.local);
        if (!tabla[p.visit]) initEquipo(tabla, p.visit);

        const res = resultados.find(r => r.partido_id === p.id);
        if (res && res.local !== null && res.visit !== null) {
          const gL = parseInt(res.local);
          const gV = parseInt(res.visit);
          actualizarStats(tabla[p.local], gL, gV);
          actualizarStats(tabla[p.visit], gV, gL);
        }
      });

      const ordenados = Object.values(tabla).sort((a, b) => {
        if (b.pts !== a.pts) return b.pts - a.pts;
        if (b.dg !== a.dg) return b.dg - a.dg;
        return b.gf - a.gf;
      });

      clasificacion[grupo] = {
        primero: ordenados[0]?.equipo,
        segundo: ordenados[1]?.equipo,
        tercero: ordenados[2]?.equipo,
        stats: ordenados
      };
    });

    return clasificacion;
  }

  function determinarEquipos16avos(clasificacion) {
    // Calcular ranking de terceros
    const terceros = Object.entries(clasificacion)
      .map(([grupo, data]) => ({
        grupo,
        equipo: data.tercero,
        pts: data.stats[2]?.pts || 0,
        dg: data.stats[2]?.dg || 0,
        gf: data.stats[2]?.gf || 0
      }))
      .sort((a, b) => {
        if (b.pts !== a.pts) return b.pts - a.pts;
        if (b.dg !== a.dg) return b.dg - a.dg;
        return b.gf - a.gf;
      })
      .slice(0, 8); // Top 8 terceros

    const mejoresTerceros = terceros.map(t => t.grupo);

    return {
      clasificacion,
      mejoresTerceros,
      getEquipo: (posicion) => {
        // Posiciones como "1°A", "2°B", "3° A/B/C/D/F"
        const match = posicion.match(/(\d+)°(.+)/);
        if (!match) return null;
        
        const puesto = parseInt(match[1]);
        const grupos = match[2].trim().split('/').map(g => g.trim());
        
        if (puesto === 1) return clasificacion[grupos[0]]?.primero;
        if (puesto === 2) return clasificacion[grupos[0]]?.segundo;
        if (puesto === 3) {
          // Buscar el mejor tercero que esté en los grupos permitidos
          for (const t of terceros) {
            if (grupos.includes(t.grupo)) return t.equipo;
          }
        }
        return null;
      }
    };
  }

  function obtenerEquipo(posicion, equipos16avos, resultados) {
    // Si ya hay resultado de ese partido, buscar el ganador en fases siguientes
    if (posicion.startsWith('G')) {
      const partidoId = 'M' + posicion.slice(1);
      const res = resultados.find(r => r.partido_id === partidoId);
      if (res && res.local !== null && res.visit !== null) {
        const partido = TODOS_PARTIDOS.find(p => p.id === partidoId);
        if (partido) {
          const gL = parseInt(res.local);
          const gV = parseInt(res.visit);
          if (gL > gV) return obtenerEquipo(partido.local, equipos16avos, resultados);
          if (gV > gL) return obtenerEquipo(partido.visit, equipos16avos, resultados);
          if (res.alargue_local !== null && res.alargue_visit !== null) {
            const alL = parseInt(res.alargue_local);
            const alV = parseInt(res.alargue_visit);
            if (alL > alV) return obtenerEquipo(partido.local, equipos16avos, resultados);
            if (alV > alL) return obtenerEquipo(partido.visit, equipos16avos, resultados);
            if (res.penales_local !== null && res.penales_visit !== null) {
              return parseInt(res.penales_local) > parseInt(res.penales_visit) 
                ? obtenerEquipo(partido.local, equipos16avos, resultados)
                : obtenerEquipo(partido.visit, equipos16avos, resultados);
            }
          }
        }
      }
      return null;
    }
    
    // Si es "Perdedor SF1" o "Ganador SF1"
    if (posicion.includes('Perdedor') || posicion.includes('Ganador')) {
      // Buscar el partido de semis correspondiente
      const semiId = posicion.includes('SF1') ? 'M101' : 'M102';
      const res = resultados.find(r => r.partido_id === semiId);
      if (res && res.local !== null && res.visit !== null) {
        const partido = TODOS_PARTIDOS.find(p => p.id === semiId);
        if (partido) {
          const gL = parseInt(res.local);
          const gV = parseInt(res.visit);
          let ganador, perdedor;
          if (gL > gV) {
            ganador = partido.local;
            perdedor = partido.visit;
          } else if (gV > gL) {
            ganador = partido.visit;
            perdedor = partido.local;
          } else {
            // Alargue/penales
            if (res.alargue_local !== null && res.alargue_visit !== null) {
              const alL = parseInt(res.alargue_local);
              const alV = parseInt(res.alargue_visit);
              if (alL > alV) { ganador = partido.local; perdedor = partido.visit; }
              else if (alV > alL) { ganador = partido.visit; perdedor = partido.local; }
              else {
                ganador = parseInt(res.penales_local) > parseInt(res.penales_visit) ? partido.local : partido.visit;
                perdedor = ganador === partido.local ? partido.visit : partido.local;
              }
            }
          }
          return posicion.includes('Ganador') ? ganador : perdedor;
        }
      }
      return null;
    }
    
    // Posición de grupo (1°A, 2°B, etc.)
    return equipos16avos.getEquipo(posicion);
  }

  function getEstadoPartido(partido, resultado) {
    if (resultado && resultado.estado) {
      return resultado.estado;
    }
    const kickoff = getKickoffTimestamp(partido);
    const ahora = Date.now();
    const finPartido = kickoff + (120 * 60 * 1000);
    if (ahora < kickoff) return 'proximo';
    if (ahora < finPartido) return 'vivo';
    return 'finalizado';
  }
</script>

</body>
</html>

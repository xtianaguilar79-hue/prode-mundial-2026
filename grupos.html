  <style>
    .grupos-container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }

    .hero-grupos p { color: var(--text2); font-size: 16px; }

    .grupo-section { margin-bottom: 40px; }
    .grupo-title { 
      font-family: 'Anton', sans-serif; 
      font-size: 24px; 
      color: var(--gold); 
      margin-bottom: 16px; 
      padding-bottom: 8px; 
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .tabla-wrap { overflow-x: auto; border-radius: var(--r); border: 1px solid var(--border); background: var(--card); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: var(--bg2); color: var(--text2); padding: 12px 8px; text-align: center; font-size: 11px; text-transform: uppercase; }
    th:first-child, td:first-child { text-align: center; width: 40px; padding-left: 16px; }
    th.left, td.left { text-align: left; }
    td { padding: 12px 8px; border-bottom: 1px solid var(--border); color: var(--text); font-size: 14px; }
    tr:last-child td { border-bottom: none; }
    
    tr.pos-1 td, tr.pos-2 td { font-weight: 700; color: var(--gold); }
    tr.pos-1 { background: rgba(255, 201, 60, 0.05); }
    
    .equipo-cell { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    .flag-sm { font-size: 16px; }

    .actualizado { text-align: center; font-size: 12px; color: var(--text3); margin-top: 40px; }

    /* ═══════════════════════════════════════════════════════ */
    /* BRACKET CIRCULAR/RADIAL STYLE */
    /* ═══════════════════════════════════════════════════════ */
    .bracket-section {
      margin: 40px 0;
      padding: 40px 20px;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #0f0f0f 100%);
      border-radius: var(--r-lg);
      border: 2px solid var(--gold);
      position: relative;
      overflow: hidden;
    }

    .bracket-section::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(255,201,60,0.3) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .bracket-title {
      font-family: 'Anton', sans-serif;
      font-size: 36px;
      color: var(--gold);
      text-align: center;
      margin-bottom: 40px;
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(255,201,60,0.5);
    }

    .circular-bracket {
      position: relative;
      width: 100%;
      height: 1000px;
      margin: 0 auto;
    }

    .trophy-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-align: center;
    }

    .trophy-icon {
      font-size: 80px;
      filter: drop-shadow(0 0 30px rgba(255,201,60,0.8));
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 20px rgba(255,201,60,0.6)); }
      to { filter: drop-shadow(0 0 40px rgba(255,201,60,1)); }
    }

    .trophy-label {
      font-family: 'Anton', sans-serif;
      font-size: 20px;
      color: var(--gold);
      margin-top: 10px;
      letter-spacing: 2px;
    }

    .bracket-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(255,201,60,0.2);
      border-radius: 50%;
      pointer-events: none;
    }

    .ring-1 { width: 200px; height: 200px; }
    .ring-2 { width: 400px; height: 400px; }
    .ring-3 { width: 600px; height: 600px; }
    .ring-4 { width: 800px; height: 800px; }
    .ring-5 { width: 950px; height: 950px; }

    .match-node {
      position: absolute;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      min-width: 140px;
      transition: all 0.3s ease;
      z-index: 5;
    }

    .match-node:hover {
      border-color: var(--gold);
      box-shadow: 0 0 20px rgba(255,201,60,0.4);
      transform: scale(1.05);
    }

    .match-node.winner {
      border-color: var(--gold);
      background: rgba(255,201,60,0.1);
    }

    .team-in-match {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 11px;
    }

    .team-in-match.winner {
      font-weight: 700;
      color: var(--gold);
    }

    .team-flag-node {
      font-size: 14px;
      margin-right: 6px;
    }

    .score-node {
      font-family: 'Anton', sans-serif;
      font-size: 13px;
      color: var(--gold);
    }

    .match-label-node {
      font-size: 9px;
      color: var(--text3);
      text-align: center;
      margin-top: 4px;
      text-transform: uppercase;
    }

    .connector-line {
      position: absolute;
      background: rgba(255,201,60,0.3);
      z-index: 1;
      pointer-events: none;
    }

    .round-label-circular {
      position: absolute;
      font-family: 'Anton', sans-serif;
      font-size: 12px;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 1px;
      background: rgba(0,0,0,0.7);
      padding: 4px 8px;
      border-radius: 4px;
      z-index: 6;
    }

    @media (max-width: 600px) {
      .hero-grupos h1 { font-size: 32px; }
      table { font-size: 12px; }
      th, td { padding: 8px 4px; }
      .circular-bracket { height: 800px; }
      .match-node { min-width: 100px; font-size: 9px; }
    }
  </style>
</head>

<script type="module">

  import { PARTIDOS_GRUPOS, PARTIDOS_ELIM, TODOS_PARTIDOS, FLAGS, getKickoffTimestamp } from "./datos-partidos.js";

  const RANKING_FIFA = {

  const ESTRUCTURA_16AVOS = [

    { id: 'M083', local: 'Portugal', visit: 'Croacia', fecha: '02/07', hora: '20:00', sede: 'Toronto, CAN' },

    { id: 'M086', local: 'Argentina', visit: 'Cabo Verde', fecha: '03/07', hora: '19:00', sede: 'Miami, USA' },
    { id: 'M087', local: 'Colombia', visit: 'Ghana', fecha: '03/07', hora: '22:30', sede: 'Kansas City, USA' }
  ];

  const ESTRUCTURA_OCTAVOS = [
    { id: 'M089', local: 'G073', visit: 'G076' },
    { id: 'M090', local: 'G074', visit: 'G075' },
    { id: 'M091', local: 'G078', visit: 'G077' },

    { id: 'M093', local: 'G082', visit: 'G081' },
    { id: 'M094', local: 'G084', visit: 'G083' },
    { id: 'M095', local: 'G085', visit: 'G088' },
    { id: 'M096', local: 'G086', visit: 'G087' }
  ];

  const ESTRUCTURA_CUARTOS = [
    { id: 'M097', local: 'G089', visit: 'G090' },
    { id: 'M098', local: 'G091', visit: 'G092' },
    { id: 'M099', local: 'G093', visit: 'G094' },
    { id: 'M100', local: 'G095', visit: 'G096' }
  ];

  const ESTRUCTURA_SEMIS = [
    { id: 'M101', local: 'G097', visit: 'G098' },
    { id: 'M102', local: 'G099', visit: 'G100' }
  ];

  const ESTRUCTURA_FINAL = [
    { id: 'M103', local: 'P101', visit: 'P102' },
    { id: 'M104', local: 'G101', visit: 'G102' }
  ];

  function initEquipo(tabla, nombre) {
    tabla[nombre] = { equipo: nombre, pj: 0, pg: 0, pe: 0, pp: 0, gf: 0, gc: 0, dg: 0, pts: 0 };
  }

  function actualizarStats(eq, golesFavor, golesContra) {
    eq.pj++;
    eq.gf += golesFavor;
    eq.gc += golesContra;
    eq.dg = eq.gf - eq.gc;
    if (golesFavor > golesContra) { eq.pg++; eq.pts += 3; }
    else if (golesFavor === golesContra) { eq.pe++; eq.pts += 1; }
    else { eq.pp++; }
  }

  function calcularEstadisticasDirectas(equipoA, equipoB, partidosGrupo, resultados) {
    const statsA = { pts: 0, gf: 0, gc: 0, dg: 0 };
    const statsB = { pts: 0, gf: 0, gc: 0, dg: 0 };

    partidosGrupo.forEach(p => {
      const entreEllos = 
        (p.local === equipoA && p.visit === equipoB) ||
        (p.local === equipoB && p.visit === equipoA);
      
      if (!entreEllos) return;
      
      const res = resultados.find(r => r.partido_id === p.id);
      if (!res || res.local === null || res.visit === null) return;

      const gL = parseInt(res.local);
      const gV = parseInt(res.visit);

      if (p.local === equipoA) {
        statsA.gf += gL; statsA.gc += gV; statsA.dg += (gL - gV);
        statsB.gf += gV; statsB.gc += gL; statsB.dg += (gV - gL);
        if (gL > gV) statsA.pts += 3;
        else if (gV > gL) statsB.pts += 3;
        else { statsA.pts += 1; statsB.pts += 1; }
      } else {
        statsB.gf += gL; statsB.gc += gV; statsB.dg += (gL - gV);
        statsA.gf += gV; statsA.gc += gL; statsA.dg += (gV - gL);
        if (gL > gV) statsB.pts += 3;
        else if (gV > gL) statsA.pts += 3;
        else { statsB.pts += 1; statsA.pts += 1; }
      }
    });

    return { statsA, statsB };
  }

  function calcularFairPlay(equipo, partidosGrupo, resultados) {
    let puntos = 0;
    partidosGrupo.forEach(p => {
      const res = resultados.find(r => r.partido_id === p.id);
      if (!res) return;
      if (p.local === equipo) {
        puntos += (parseInt(res.amarillas_local) || 0) * -1 + (parseInt(res.rojas_local) || 0) * -4;
      } else if (p.visit === equipo) {
        puntos += (parseInt(res.amarillas_visit) || 0) * -1 + (parseInt(res.rojas_visit) || 0) * -4;
      }
    });
    return puntos;
  }

  function compararEquipos(a, b, tabla, partidosGrupo, resultados) {
    if (b.pts !== a.pts) return b.pts - a.pts;
    const { statsA, statsB } = calcularEstadisticasDirectas(a.equipo, b.equipo, partidosGrupo, resultados);
    if (statsB.pts !== statsA.pts) return statsB.pts - statsA.pts;
    if (statsB.dg !== statsA.dg) return statsB.dg - statsA.dg;
    if (statsB.gf !== statsA.gf) return statsB.gf - statsA.gf;
    if (b.dg !== a.dg) return b.dg - a.dg;
    if (b.gf !== a.gf) return b.gf - a.gf;
    const fairPlayA = calcularFairPlay(a.equipo, partidosGrupo, resultados);
    const fairPlayB = calcularFairPlay(b.equipo, partidosGrupo, resultados);
    if (fairPlayA !== fairPlayB) return fairPlayB - fairPlayA;
    return (RANKING_FIFA[a.equipo] || 100) - (RANKING_FIFA[b.equipo] || 100);
  }

  function calcularClasificacion(resultados) {
    const GRUPOS = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];
    const clasificacion = {};

    GRUPOS.forEach(grupo => {
      const partidosGrupo = PARTIDOS_GRUPOS.filter(p => p.grupo === grupo);
      const tabla = {};

      partidosGrupo.forEach(p => {
        if (!tabla[p.local]) initEquipo(tabla, p.local);
        if (!tabla[p.visit]) initEquipo(tabla, p.visit);
        const res = resultados.find(r => r.partido_id === p.id);
        if (res && res.local !== null && res.visit !== null) {
          actualizarStats(tabla[p.local], parseInt(res.local), parseInt(res.visit));
          actualizarStats(tabla[p.visit], parseInt(res.visit), parseInt(res.local));
        }
      });

      const ordenados = Object.values(tabla).sort((a, b) => 
        compararEquipos(a, b, tabla, partidosGrupo, resultados)
      );

      clasificacion[grupo] = {
        primero: ordenados[0]?.equipo || null,
        segundo: ordenados[1]?.equipo || null,
        tercero: ordenados[2]?.equipo || null,
        stats: ordenados
      };
    });

    return clasificacion;
  }

  function obtenerMejoresTerceros(clasificacion, resultados) {
    return Object.entries(clasificacion)
      .map(([grupo, data]) => {
        const equipo = data.tercero;
        if (!equipo) return null;
        const partidosGrupo = PARTIDOS_GRUPOS.filter(p => p.grupo === grupo);
        const statsEquipo = data.stats.find(s => s.equipo === equipo);
        return {
          grupo, equipo,
          pts: statsEquipo?.pts || 0,
          dg: statsEquipo?.dg || 0,
          gf: statsEquipo?.gf || 0,
          fairPlay: calcularFairPlay(equipo, partidosGrupo, resultados),
          rankingFifa: RANKING_FIFA[equipo] || 100
        };
      })
      .filter(t => t !== null)
      .sort((a, b) => {
        if (b.pts !== a.pts) return b.pts - a.pts;
        if (b.dg !== a.dg) return b.dg - a.dg;
        if (b.gf !== a.gf) return b.gf - a.gf;
        if (b.fairPlay !== a.fairPlay) return b.fairPlay - a.fairPlay;
        return a.rankingFifa - b.rankingFifa;
      })
      .slice(0, 8);
  }

  function faseDeGruposTerminada(resultados) {
    const partidosGrupos = PARTIDOS_GRUPOS;
    const partidosConResultado = partidosGrupos.filter(p => {
      const res = resultados.find(r => r.partido_id === p.id);
      return res && res.local !== null && res.visit !== null;
    });
    
    return partidosConResultado.length === partidosGrupos.length;
  }
  
  function resolverGanador(partidoId, resultados) {
    const res = resultados.find(r => r.partido_id === partidoId);
    if (!res || res.local === null || res.visit === null) return null;
    
    const gL = parseInt(res.local);
    const gV = parseInt(res.visit);
    
    if (gL > gV) return 'local';
    if (gV > gL) return 'visit';
    
    if (res.alargue_local !== null && res.alargue_visit !== null) {
      const alL = parseInt(res.alargue_local);
      const alV = parseInt(res.alargue_visit);
      if (alL > alV) return 'local';
      if (alV > alL) return 'visit';
      
      if (res.penales_local !== null && res.penales_visit !== null) {
        return parseInt(res.penales_local) > parseInt(res.penales_visit) ? 'local' : 'visit';
      }
    }
    
    return null;
  }

  function obtenerEquipoDeCruce(posicion, resultados, clasificacion) {
    if (!posicion) return null;
    if (typeof posicion === 'object' && posicion.equipo) return posicion;
    
    if (!posicion.startsWith('G') && !posicion.startsWith('P')) {
      return { equipo: posicion, grupo: null };
    }
    
    if (posicion.startsWith('G07')) {
      const partidoId = 'M' + posicion.substring(1);
      const ganador = resolverGanador(partidoId, resultados);
      if (!ganador) return null;
      
      const partido = ESTRUCTURA_16AVOS.find(p => p.id === partidoId);
      if (!partido) return null;
      
      const equipoNombre = ganador === 'local' ? partido.local : partido.visit;
      return { equipo: equipoNombre, grupo: null };
    }
    
    if (posicion.startsWith('G08') || posicion.startsWith('G09')) {
      const partidoId = 'M' + posicion.substring(1);
      const ganador = resolverGanador(partidoId, resultados);
      if (!ganador) return null;
      
      const partido = ESTRUCTURA_OCTAVOS.find(p => p.id === partidoId) || 
                      ESTRUCTURA_CUARTOS.find(p => p.id === partidoId);
      if (!partido) return null;
      
      const local = obtenerEquipoDeCruce(partido.local, resultados, clasificacion);
      const visit = obtenerEquipoDeCruce(partido.visit, resultados, clasificacion);
      
      if (!local || !visit) return null;
      
      const equipoNombre = ganador === 'local' ? local.equipo : visit.equipo;
      return { equipo: equipoNombre, grupo: null };
    }
    
    if (posicion.startsWith('P')) {
      const partidoId = 'M' + posicion.substring(1);
      const ganador = resolverGanador(partidoId, resultados);
      if (!ganador) return null;
      
      const partido = ESTRUCTURA_SEMIS.find(p => p.id === partidoId);
      if (!partido) return null;
      
      const local = obtenerEquipoDeCruce(partido.local, resultados, clasificacion);
      const visit = obtenerEquipoDeCruce(partido.visit, resultados, clasificacion);
      
      if (!local || !visit) return null;
      
      const perdedorNombre = ganador === 'local' ? visit.equipo : local.equipo;
      return { equipo: perdedorNombre, grupo: null };
    }
    
    if (posicion.startsWith('G10')) {
      const partidoId = 'M' + posicion.substring(1);
      const ganador = resolverGanador(partidoId, resultados);
      if (!ganador) return null;
      
      const partido = ESTRUCTURA_SEMIS.find(p => p.id === partidoId);
      if (!partido) return null;
      
      const local = obtenerEquipoDeCruce(partido.local, resultados, clasificacion);
      const visit = obtenerEquipoDeCruce(partido.visit, resultados, clasificacion);
      
      if (!local || !visit) return null;
      
      const equipoNombre = ganador === 'local' ? local.equipo : visit.equipo;
      return { equipo: equipoNombre, grupo: null };
    }
    
    return null;
  }

  function obtenerPerdedorSemi(semiId, resultados, clasificacion) {
    const estructura = ESTRUCTURA_SEMIS.find(s => s.id === semiId);
    if (!estructura) return null;
    
    const ganador = resolverGanador(semiId, resultados);
    if (!ganador) return null;
    
    const local = obtenerEquipoDeCruce(estructura.local, resultados, clasificacion);
    const visit = obtenerEquipoDeCruce(estructura.visit, resultados, clasificacion);
    
    if (!local || !visit) return null;
    
    const perdedorNombre = ganador === 'local' ? visit.equipo : local.equipo;
    return { equipo: perdedorNombre, grupo: null };
  }

  (async () => {
    try {
      const { data: resultados, error } = await supabase
        .from('resultados')
        .select('*');

      if (error) {
        console.error("Error al cargar resultados:", error);
        throw error;
      }

      console.log("✅ Resultados cargados:", resultados?.length || 0);

      const clasificacion = calcularClasificacion(resultados || []);
      const terminoFaseGrupos = faseDeGruposTerminada(resultados || []);
      
      if (terminoFaseGrupos) {
        document.getElementById('contenido-clasificados').style.display = 'none';
        document.getElementById('contenido-grupos').style.display = 'none';
        document.getElementById('contenido-bracket').style.display = 'block';
        document.getElementById('contenido-bracket').innerHTML = renderBracketCircular(resultados || [], clasificacion);
      } else {
        document.getElementById('contenido-clasificados').style.display = 'block';
        document.getElementById('contenido-grupos').style.display = 'block';
        document.getElementById('contenido-bracket').style.display = 'none';
        renderClasificados(clasificacion, resultados || []);
        renderTablas(resultados || []);
      }
      
      document.getElementById('loader').style.display = 'none';
      document.getElementById('txt-actualizado').textContent = `Última actualización: ${new Date().toLocaleTimeString()}`;
    } catch (err) {
      console.error("Error crítico:", err);
      document.getElementById('loader').innerHTML = `<p style="color:var(--red)">Error al cargar datos: ${err.message}</p>`;
    }
  })();

  function renderClasificados(clasificacion, resultados) {
    try {
      const contenedor = document.getElementById('contenido-clasificados');
      const GRUPOS = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];
      
      const primeros = GRUPOS.map(grupo => {
        const data = clasificacion[grupo];
        const equipo = data.primero;
        const statsEquipo = data.stats.find(s => s.equipo === equipo);
        return {
          grupo, equipo,
          pts: statsEquipo?.pts || 0,
          dg: statsEquipo?.dg || 0,
          gf: statsEquipo?.gf || 0,
          rankingFifa: RANKING_FIFA[equipo] || 100
        };
      }).sort((a, b) => {
        if (b.pts !== a.pts) return b.pts - a.pts;
        if (b.dg !== a.dg) return b.dg - a.dg;
        if (b.gf !== a.gf) return b.gf - a.gf;
        return a.rankingFifa - b.rankingFifa;
      });

      const segundos = GRUPOS.map(grupo => {
        const data = clasificacion[grupo];
        const equipo = data.segundo;
        const statsEquipo = data.stats.find(s => s.equipo === equipo);
        return {
          grupo, equipo,
          pts: statsEquipo?.pts || 0,
          dg: statsEquipo?.dg || 0,
          gf: statsEquipo?.gf || 0,
          rankingFifa: RANKING_FIFA[equipo] || 100
        };
      }).sort((a, b) => {
        if (b.pts !== a.pts) return b.pts - a.pts;
        if (b.dg !== a.dg) return b.dg - a.dg;
        if (b.gf !== a.gf) return b.gf - a.gf;
        return a.rankingFifa - b.rankingFifa;
      });

      const terceros = obtenerMejoresTerceros(clasificacion, resultados);

      let html = '<div class="clasificados-title">🏆 CLASIFICADOS A 16AVOS DE FINAL</div>';
      html += '<div class="clasificados-grid">';

      html += `
        <div class="clasificados-columna">
          <h3>🥇 PRIMEROS (12)</h3>
          <table>
            <thead><tr><th>#</th><th>Equipo</th><th>Grupo</th><th>PTS</th><th>DG</th><th>GF</th></tr></thead>
            <tbody>
              ${primeros.map((eq, i) => `
                <tr>
                  <td>${i + 1}</td>
                  <td><span class="flag-sm">${FLAGS[eq.equipo] || '🏳️'}</span> ${eq.equipo}</td>
                  <td><span class="grupo-badge">${eq.grupo}</span></td>
                  <td><strong>${eq.pts}</strong></td>
                  <td>${eq.dg > 0 ? '+' + eq.dg : eq.dg}</td>
                  <td>${eq.gf}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;

      html += `
        <div class="clasificados-columna">
          <h3>🥈 SEGUNDOS (12)</h3>
          <table>
            <thead><tr><th>#</th><th>Equipo</th><th>Grupo</th><th>PTS</th><th>DG</th><th>GF</th></tr></thead>
            <tbody>
              ${segundos.map((eq, i) => `
                <tr>
                  <td>${i + 1}</td>
                  <td><span class="flag-sm">${FLAGS[eq.equipo] || '🏳️'}</span> ${eq.equipo}</td>
                  <td><span class="grupo-badge">${eq.grupo}</span></td>
                  <td><strong>${eq.pts}</strong></td>
                  <td>${eq.dg > 0 ? '+' + eq.dg : eq.dg}</td>
                  <td>${eq.gf}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;

      html += `
        <div class="clasificados-columna">
          <h3>🥉 MEJORES TERCEROS (8)</h3>
          <table>
            <thead><tr><th>#</th><th>Equipo</th><th>Grupo</th><th>PTS</th><th>DG</th><th>GF</th></tr></thead>
            <tbody>
              ${terceros.map((eq, i) => `
                <tr>
                  <td>${i + 1}</td>
                  <td><span class="flag-sm">${FLAGS[eq.equipo] || '🏳️'}</span> ${eq.equipo}</td>
                  <td><span class="grupo-badge">${eq.grupo}</span></td>
                  <td><strong>${eq.pts}</strong></td>
                  <td>${eq.dg > 0 ? '+' + eq.dg : eq.dg}</td>
                  <td>${eq.gf}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;

      html += '</div>';
      contenedor.innerHTML = html;
    } catch (err) {
      console.error("Error en renderClasificados:", err);
    }
  }

  function renderTablas(resultados) {
    try {
      const contenedor = document.getElementById('contenido-grupos');
      const GRUPOS = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];
      let html = "";

      GRUPOS.forEach(grupo => {
        const partidosGrupo = PARTIDOS_GRUPOS.filter(p => p.grupo === grupo);
        const tabla = {};

        partidosGrupo.forEach(p => {
          if (!tabla[p.local]) initEquipo(tabla, p.local);
          if (!tabla[p.visit]) initEquipo(tabla, p.visit);
          const res = resultados.find(r => r.partido_id === p.id);
          if (res && res.local !== null && res.visit !== null) {
            actualizarStats(tabla[p.local], parseInt(res.local), parseInt(res.visit));
            actualizarStats(tabla[p.visit], parseInt(res.visit), parseInt(res.local));
          }
        });

        const clasificados = Object.values(tabla).sort((a, b) => 
          compararEquipos(a, b, tabla, partidosGrupo, resultados)
        );

        html += `
          <div class="grupo-section">
            <div class="grupo-title">GRUPO ${grupo}</div>
            <div class="tabla-wrap">
              <table>
                <thead>
                  <tr>
                    <th>#</th><th class="left">Equipo</th><th>PTS</th><th>PJ</th><th>PG</th><th>PE</th><th>PP</th><th>GF</th><th>GC</th><th>DG</th>
                  </tr>
                </thead>
                <tbody>
                  ${clasificados.map((eq, i) => `
                    <tr class="pos-${i + 1}">
                      <td>${i + 1}</td>
                      <td class="left">
                        <div class="equipo-cell">
                          <span class="flag-sm">${FLAGS[eq.equipo] || "🏳️"}</span>
                          <span>${eq.equipo}</span>
                        </div>
                      </td>
                      <td>${eq.pts}</td><td>${eq.pj}</td><td>${eq.pg}</td><td>${eq.pe}</td><td>${eq.pp}</td><td>${eq.gf}</td><td>${eq.gc}</td><td>${eq.dg > 0 ? '+' + eq.dg : eq.dg}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;
      });

      contenedor.innerHTML = html;
    } catch (err) {
      console.error("Error en renderTablas:", err);
    }
  }
</script>
